<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Board Game Scores</title>
  <link rel="stylesheet" href="style.css?v=4" />
</head>
<body>
  <main class="app">
    <header class="header">
      <button id="home-btn" class="home-btn hidden" type="button" title="Back to games">‹</button>
      <h1 id="title">Board Games</h1>
      <div id="rule" class="rule hidden"></div>
    </header>

    <section id="home" class="home">
      <h2>Choose a game</h2>

      <button id="pick-flip7" class="game-card" type="button">
        <span class="game-name">Flip 7</span>
        <span class="game-desc">First to 200 — most points wins</span>
      </button>

      <form id="custom-form" class="game-card custom">
        <span class="game-name">Custom game</span>
        <label class="field">
          <span>Name</span>
          <input id="custom-name" type="text" placeholder="Custom game" maxlength="24" autocomplete="off" />
        </label>
        <label class="field">
          <span>Winner is</span>
          <select id="custom-mode">
            <option value="most">Most points</option>
            <option value="least">Fewest points</option>
          </select>
        </label>
        <label class="field">
          <span>Point limit</span>
          <input id="custom-target" type="number" inputmode="numeric" min="1" step="1" value="100" />
        </label>
        <button type="submit" class="primary">Create game</button>
      </form>
    </section>

    <section id="setup" class="setup hidden">
      <h2>Players</h2>
      <form id="add-player-form" class="add-player">
        <input id="player-name" type="text" placeholder="Add a player…" autocomplete="off" maxlength="20" />
        <button type="submit">Add</button>
      </form>
      <ul id="player-list" class="player-list"></ul>
      <button id="start-btn" class="primary" disabled>Start game</button>
    </section>

    <section id="game" class="game hidden">
      <div class="table-wrap">
        <table id="score-table" class="score-table">
          <thead>
            <tr id="score-head"></tr>
          </thead>
          <tbody id="score-body"></tbody>
        </table>
      </div>

      <div id="banner" class="banner hidden"></div>

      <div class="controls">
        <button id="add-round-btn" class="primary">Add round</button>
        <button id="new-game-btn" class="ghost">New game</button>
      </div>
    </section>
  </main>

  <script src="app.js?v=4"></script>
</body>
</html>
